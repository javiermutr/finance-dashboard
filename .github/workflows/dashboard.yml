name: Finance Dashboard

on:
  schedule:
    - cron: '30 8 * * *'   # 10:30 AM Berlin (CEST = UTC+2)
    - cron: '0 9 * * *'    # 11:00 AM Berlin
    - cron: '30 9 * * *'   # 11:30 AM Berlin
    - cron: '0 10 * * *'   # 12:00 PM Berlin
    - cron: '30 10 * * *'  # 12:30 PM Berlin
    - cron: '0 11 * * *'   # 1:00 PM Berlin
    - cron: '30 11 * * *'  # 1:30 PM Berlin
    - cron: '0 12 * * *'   # 2:00 PM Berlin
    - cron: '30 12 * * *'  # 2:30 PM Berlin
    - cron: '30 18 * * *'  # 8:30 PM Berlin
  workflow_dispatch:
    
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Generate dashboard
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python generate_dashboard.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add output/dashboard.html
          git diff --staged --quiet || git commit -m "chore: dashboard update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push origin main